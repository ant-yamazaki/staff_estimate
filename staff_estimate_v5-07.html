<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Factory ant｜スタッフ見積ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#40dfab;--green-dk:#1ab58a;--green-pale:#edfff8;--green-bg:#f0fdf8;
  --bg:#f0f2f5;--card:#fff;--border:#e4e8ed;--text:#1a1d24;--sub:#7c8494;
  --blue:#4a80f0;--blue-pale:#eef3ff;--blue-bg:#f4f7ff;
  --red:#ff4d6d;--shadow:0 2px 10px rgba(0,0,0,.07);
}
::placeholder{color:#c8cdd6;}
body{background:var(--bg);font-family:'Noto Sans JP',sans-serif;color:var(--text);min-height:100vh;}


/* ─── ヘッダー ─── */
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d1b2a 0%,#1c3347 100%);padding:12px 20px;display:flex;align-items:center;box-shadow:0 4px 18px rgba(0,0,0,.3);transition:transform .25s ease;}
.hdr.hdr-hidden{transform:translateY(-100%);}
.hdr-logo{display:flex;align-items:center;gap:10px;}
.hdr-logo-link{display:flex;align-items:center;flex-shrink:0;}
.hdr-logo-img{height:60px;width:auto;object-fit:contain;}
.hdr-badge{background:var(--green);color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:3px;letter-spacing:.1em;}
.hdr-sub{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;}

/* ─── レイアウト ─── */
.wrap{max-width:960px;margin:0 auto;padding:18px 14px 80px;}

/* ─── メモカード ─── */
.memo{background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:14px;box-shadow:var(--shadow);border-left:3px solid var(--green);}
.memo-row{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;}
.memo-row+.memo-row{margin-top:8px;}
.fl{font-size:11px;font-weight:700;color:var(--sub);white-space:nowrap;}
.fi{border:1.5px solid var(--border);border-radius:7px;padding:5px 9px;font-size:13px;font-family:inherit;outline:none;background:#fafafa;color:var(--text);transition:.15s;}
.fi:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(64,223,171,.12);}
.fi.nm{flex:1;min-width:140px;}.fi.dt{width:135px;}.fi.nt{flex:1;min-width:140px;}

/* ─── セクションカード ─── */
.sec{background:var(--card);border-radius:14px;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:13px 18px;background:#f8f9fb;border-bottom:1px solid var(--border);}
.sec-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.sec-icon.mat{background:linear-gradient(135deg,#e0f7ef,#c6f0e2);}
.sec-icon.proc{background:linear-gradient(135deg,#e0eeff,#c6d8ff);}
.sec-ttl{font-size:14px;font-weight:700;}
.sec-badge{margin-left:auto;font-size:11px;font-weight:700;color:var(--green-dk);background:var(--green-pale);padding:2px 8px;border-radius:6px;}
.sec-badge.blue{color:#2d60d4;background:var(--blue-pale);}
.sec-hdr-toggle{cursor:pointer;user-select:none;transition:.15s;}
.sec-hdr-toggle:hover{background:#f0f2f5;}
.sec-arrow{margin-left:auto;font-size:10px;color:var(--sub);transition:transform .2s;}
.sec-body{padding:12px 16px;}

/* ─── 共通グループカード ─── */
.grp{border:2px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:visible;transition:.15s;}
.grp:focus-within{border-color:rgba(64,223,171,.4);}
.grp.proc-grp:focus-within{border-color:rgba(74,128,240,.4);}
.grp-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(135deg,#f4f6f9,#eef0f4);border-bottom:1px solid var(--border);border-radius:10px 10px 0 0;}
.grp-num{width:22px;height:22px;border-radius:6px;background:var(--green);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.grp-num.blue{background:var(--blue);}
.grp-subtotal{margin-left:auto;display:flex;align-items:center;gap:6px;}
.grp-sub-qty{font-size:11px;color:var(--sub);}
.grp-sub-val{font-size:14px;font-weight:900;color:var(--green-dk);white-space:nowrap;}
.grp-sub-val.blue{color:#2d60d4;}
.grp-del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:6px;transition:.12s;flex-shrink:0;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
.grp-del-btn:hover{background:#fff0f3;color:var(--red);}
.grp-body{padding:10px 12px 6px;}

/* ─── 素材グループ固有 ─── */
.grp-name-wrap{display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.grp-name-sel{border:1.5px solid var(--border);border-radius:7px;padding:4px 8px;font-size:13px;font-weight:700;font-family:inherit;outline:none;background:#fff;cursor:pointer;min-width:130px;transition:.15s;}
.grp-name-sel:focus{border-color:var(--green);}
.grp-name-txt{border:1.5px solid var(--border);border-radius:7px;padding:4px 8px;font-size:13px;font-weight:700;font-family:inherit;outline:none;background:#fff;flex:1;min-width:80px;max-width:200px;transition:.15s;}
.grp-name-txt:focus{border-color:var(--green);}
.grp-name-txt.hidden{display:none;}

/* ─── 加工グループ固有 ─── */
.proc-method-wrap{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;}
.proc-method-sel{border:1.5px solid #c5d0e0;border-radius:7px;padding:4px 10px;font-size:13px;font-weight:700;font-family:inherit;outline:none;background:#fff;cursor:pointer;min-width:170px;max-width:100%;transition:.15s;}
.proc-method-sel:focus{border-color:var(--blue);}
.proc-method-badge{font-size:11px;color:rgba(255,255,255,.9);background:var(--blue);border-radius:5px;padding:2px 8px;font-weight:700;}

/* ─── 列ヘッダー（素材） ─── */
.mat-col-hdr{display:grid;grid-template-columns:110px 1fr 78px 68px 86px 78px 86px 58px;gap:5px;align-items:center;padding:2px 10px 4px;font-size:10px;font-weight:700;color:#aab0bb;letter-spacing:.04em;}

/* ─── 素材行（段組みレイアウト） ─── */
.mat-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.mat-row{display:flex;flex-direction:column;background:#fafafa;border:1.5px solid var(--border);border-radius:9px;padding:7px 10px;transition:.15s;}
.mat-row:focus-within{border-color:rgba(64,223,171,.5);background:var(--green-bg);}
.mat-row.has-val{border-color:rgba(64,223,171,.3);background:var(--green-bg);}
.mat-row-line0{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.mat-row-line0b{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.mat-row-line1{display:flex;gap:6px;align-items:center;justify-content:flex-start;margin-top:4px;}
.mat-row-line2{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding-top:5px;margin-top:5px;border-top:1px solid #eef0f3;}
.mat-row-line2 .retail2{font-size:12px;color:var(--sub);white-space:nowrap;}
.mat-row-line2 .cost2{font-size:15px;font-weight:800;color:var(--green-dk);white-space:nowrap;}
.mat-row .mr-maker{width:22%;flex-shrink:0;}
.mat-row .mr-code{width:20%;flex-shrink:0;}
.mat-row .mr-btns{display:flex;gap:2px;flex-shrink:0;}
.mat-row .mr-colordetail{flex:1;min-width:0;width:auto;}
.mat-row .mr-size{width:88px;flex-shrink:0;}
.mat-row .mr-szcustom{width:65px;}
.mat-row .mr-qty{width:80px;}
.mat-row .mr-retail{width:100px;}
.mat-row .mr-disc{width:110px;flex-shrink:0;}
.mr-unit{font-size:11px;color:var(--sub);flex-shrink:0;}
.mr-prodname{font-size:11px;color:var(--sub);padding:1px 4px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mat-row-line0 .maker-custom-input{width:18%;flex-shrink:0;font-size:12px;padding:5px 6px;border:1.5px solid var(--border);border-radius:7px;outline:none;font-family:inherit;background:#fff;}
.mat-row-line0 .maker-custom-input:focus{border-color:var(--green);}
.color-detail-wrap{display:flex;gap:4px;align-items:center;}
.color-detail-input{font-size:12px;padding:5px 6px;border:1.5px solid var(--border);border-radius:7px;outline:none;background:#fff;transition:.15s;flex:1;min-width:0;}
.color-detail-input:focus{border-color:var(--green);}
.color-detail-input::placeholder{color:#aaa;}
.color-group-tag{font-size:11px;color:#fff;background:var(--green);border-radius:5px;padding:3px 9px;white-space:nowrap;flex-shrink:0;font-weight:600;}

.grp-body-disabled{background:#f8f8f8;border-radius:0 0 10px 10px;padding:14px;}
.grp-disabled-msg{text-align:center;font-size:13px;color:#b0b8c4;font-weight:600;padding:4px 0;}
.sel-empty{color:#b0b8c4;}
.sel-empty option[value=""]{color:#b0b8c4;}
.sel-empty option:not([value=""]){color:#1a2332;}

/* ─── 加工行（2行レイアウト） ─── */
.proc-line-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.proc-line{display:flex;flex-direction:column;background:#fafafa;border:1.5px solid var(--border);border-radius:9px;padding:7px 10px;transition:.15s;}
.proc-line:focus-within{border-color:rgba(74,128,240,.4);background:var(--blue-bg);}
.proc-line.has-val{border-color:rgba(74,128,240,.3);background:var(--blue-bg);}
.proc-line-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.proc-line-bottom{display:flex;align-items:center;justify-content:flex-end;gap:10px;padding-top:5px;margin-top:5px;border-top:1px solid #e8edf5;}
.proc-line-bottom .cost2b{font-size:15px;font-weight:800;color:var(--blue);white-space:nowrap;flex-shrink:0;}
.proc-line-bottom .detail2b{font-size:12px;color:var(--sub);white-space:nowrap;}

/* 共通 input/select */
.mi,.ms{border:1.5px solid var(--border);border-radius:7px;padding:5px 6px;font-size:12px;font-family:inherit;outline:none;background:#fff;transition:.15s;width:100%;}
.mi{-moz-appearance:textfield;}
.mi::-webkit-inner-spin-button,.mi::-webkit-outer-spin-button{-webkit-appearance:none;}
.mi:focus,.ms:focus{border-color:var(--green);}
.ms{cursor:pointer;}
.mi.num{text-align:right;font-weight:700;}
.mat-result-cell{text-align:right;font-size:13px;font-weight:700;color:var(--green-dk);white-space:nowrap;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:6px;transition:.12s;width:34px;height:34px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.del-btn:hover{background:#fff0f3;color:var(--red);}
.dup-btn{background:none;border:none;color:#b0bec5;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:6px;transition:.12s;width:34px;height:34px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.dup-btn:hover{background:#e8f4fd;color:#4a80f0;}

/* 加工行 内部部品 */
.pl-label{flex:1;min-width:100px;border:1.5px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;background:#fff;transition:.15s;}
.pl-label:focus{border-color:var(--blue);}
.pl-sel{border:1.5px solid var(--border);border-radius:7px;padding:5px 7px;font-size:12px;font-family:inherit;outline:none;background:#fff;cursor:pointer;font-weight:700;transition:.15s;}
.pl-sel:focus{border-color:var(--blue);}
.pl-num{width:88px;border:1.5px solid var(--border);border-radius:7px;padding:5px 7px;font-size:13px;font-weight:700;text-align:right;font-family:inherit;outline:none;background:#fff;transition:.15s;-moz-appearance:textfield;}
.pl-num::-webkit-inner-spin-button,.pl-num::-webkit-outer-spin-button{-webkit-appearance:none;}
.pl-num:focus{border-color:var(--blue);}
.qty-toggle{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0;}
.qty-toggle button{border:none;background:#fff;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);transition:.12s;font-family:inherit;}
.qty-toggle button.on{background:var(--blue);color:#fff;}
.qty-val{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;background:#f0f2f5;padding:4px 10px;border-radius:6px;}
.pl-result{margin-left:auto;text-align:right;white-space:nowrap;flex-shrink:0;}
.pl-result .r-val{font-size:13px;font-weight:700;color:#2d60d4;}
.pl-result .r-pend{font-size:11px;color:#b8bfc9;}
.pl-result .r-err{font-size:11px;color:var(--red);}

/* ─── 追加ボタン ─── */
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:8px;background:none;border:1.5px dashed #ced3db;border-radius:8px;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;margin-bottom:8px;}
.add-btn:hover{border-color:var(--green);color:var(--green-dk);background:var(--green-bg);}
.add-btn.blue:hover{border-color:var(--blue);color:#2d60d4;background:var(--blue-bg);}
.add-grp-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:11px;background:none;border:2px dashed #b6bfc9;border-radius:10px;color:#7c8494;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;}
.add-grp-btn:hover{border-color:var(--green);color:var(--green-dk);background:var(--green-bg);}
.add-grp-btn.blue:hover{border-color:var(--blue);color:#2d60d4;background:var(--blue-bg);}

/* ─── フッター ─── */
.sec-footer{display:flex;justify-content:flex-end;align-items:center;gap:8px;padding:8px 4px 2px;border-top:1px dashed #d8dde4;margin-top:8px;}
.sec-footer .lbl{font-size:12px;color:var(--sub);}
.sec-footer .val+.lbl{margin-left:-4px;}
.sec-footer .qty-note{font-size:11px;color:var(--sub);margin-right:auto;}
.sec-footer .val{font-size:17px;font-weight:900;color:var(--text);}

/* ─── フローティング合計フッター ─── */
.sum-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:linear-gradient(135deg,#0d1b2a 0%,#1c3347 100%);
  box-shadow:0 -4px 24px rgba(0,0,0,.35);
  border-top:1px solid rgba(255,255,255,.08);
}
.sum-footer-inner{
  max-width:1080px;margin:0 auto;padding:24px 24px 24px;
  display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto;align-items:start;gap:16px;
}
.sum-footer-actions{display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;flex-shrink:0;grid-column:1/-1;margin-top:10px;}
.sum-rows{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.sum-col-left{display:flex;flex-direction:column;gap:4px;}
.sum-col-center{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:320px;}
.sum-col-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.sum-col-left .sr,.sum-col-right .sr{gap:8px;}
.sr{display:flex;align-items:baseline;gap:5px;}
.sr .sl{color:rgba(255,255,255,.5);font-size:11px;white-space:nowrap;}
.sr .sv{color:rgba(255,255,255,.8);font-size:13px;font-weight:700;white-space:nowrap;}
.sr.grp-line .sl{color:rgba(255,255,255,.35);font-size:10px;}
.sr.grp-line .sv{color:rgba(255,255,255,.45);font-size:11px;}
.sr.sec-total .sl{color:rgba(255,255,255,.6);font-size:11px;font-weight:700;}
.sr.sec-total .sv{color:rgba(255,255,255,.85);font-size:13px;font-weight:700;}
.sr.div{width:1px;height:24px;background:rgba(255,255,255,.12);margin:0 2px;align-self:center;}
.sr.grand .sl{color:rgba(255,255,255,.7);font-size:13px;font-weight:700;}
.sr.grand .sv{color:var(--green);font-size:32px;font-weight:900;letter-spacing:-1px;}
.sr.grand .su{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;margin-left:2px;}
.unit-note{color:rgba(255,255,255,.3);font-size:10px;white-space:nowrap;}
/* ページ下部にフッター分の余白 */
.wrap{padding-bottom:160px;}
.export-btn{display:flex;align-items:center;gap:5px;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap;}
.export-btn.copy{background:rgba(74,128,240,.25);color:#90b4ff;border:1px solid rgba(74,128,240,.35);}
.export-btn.copy:hover{background:rgba(74,128,240,.4);}
.export-btn.img{background:rgba(64,223,171,.2);color:#40dfab;border:1px solid rgba(64,223,171,.3);}
.export-btn.img:hover{background:rgba(64,223,171,.35);}
.export-btn.reset{background:rgba(255,77,109,.15);color:#ff8099;border:1px solid rgba(255,77,109,.25);}
.export-btn.reset:hover{background:rgba(255,77,109,.28);}
.export-btn:disabled{opacity:.5;cursor:not-allowed;}

/* 価格検索ポップアップ */
.mr-popup-slot{} /* ポップアップの挿入スロット */
.price-popup{position:relative;background:#fff;border:1.5px solid var(--green);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:10px;margin:6px 0;box-sizing:border-box;z-index:300;}
.price-popup-title{font-size:11px;color:var(--sub);margin-bottom:6px;line-height:1.4;padding-right:16px;word-break:break-all;}
.price-popup-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;}
.price-popup-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;transition:.15s;gap:8px;}
.price-popup-item:hover{border-color:var(--green);background:#f0faf5;}
.price-popup-item .pi-label{font-size:12px;color:#333;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.price-popup-item .pi-price{font-size:13px;font-weight:800;color:var(--green-dk);white-space:nowrap;flex-shrink:0;}
.price-popup-close{position:absolute;top:6px;right:8px;font-size:16px;color:var(--sub);cursor:pointer;line-height:1;}
@media(max-width:640px){
  .sum-footer-inner{
    grid-template-columns:1fr;padding:10px 16px 10px;gap:6px;
  }
  .sum-col-left{display:none !important;}
  .sum-col-right{display:none !important;}
  .sum-col-center{min-width:unset;order:1;}
  .sum-footer-actions{order:2;margin-top:2px;}
  .sr.grand .sv{font-size:24px;}
  .export-btn{padding:6px 10px;font-size:11px;}

  /* ヘッダー：スマホ */
  .hdr{padding:10px 16px;}

  /* iOS自動ズーム防止：全input/selectを16px以上に */
  .mi,.ms,.fi,.pl-label,.pl-num,.pl-sel,.gs,.gn{font-size:16px !important;}

  /* ─── 全体の余白調整 ─── */
  .wrap{padding:12px 8px 160px;}
  .sec-body{padding:10px 10px;}
  .grp-body{padding:8px 8px 6px;}
  .mat-row{padding:8px 8px;}

  /* ─── 素材行line0：メーカー＋品番＋ボタン ─── */
  .mat-row-line0{gap:5px;}
  .mat-row .mr-maker{width:38%;font-size:13px;padding:7px 6px;}
  .mat-row .mr-code{width:calc(62% - 82px);flex-shrink:1;}
  .mat-row .mr-code .mi{font-size:14px;padding:7px 8px;}
  .mat-row .mr-btns{flex-shrink:0;}

  /* 複製・削除ボタン：スマホでタップしやすく */
  .del-btn,.dup-btn{font-size:20px;width:38px;height:38px;border-radius:8px;}
  .grp-del-btn{font-size:20px;width:38px;height:38px;border-radius:8px;}
  .mat-row-line0 .maker-custom-input{width:calc(62% - 82px) !important;font-size:13px;padding:7px 6px;}

  /* ─── 素材行line0b：カラー＋サイズ ─── */
  .mat-row-line0b{gap:5px;}
  .mat-row .mr-colordetail{font-size:13px;padding:7px 8px;flex:1;min-width:60px;width:auto;}
  .mat-row .mr-size{width:30%;font-size:13px;padding:7px 6px;}
  .mat-row .mr-szcustom{width:60px;font-size:13px;padding:7px 6px;}
  .color-group-tag{font-size:10px;padding:2px 7px;}

  /* ─── 素材行line1：枚数・価格・割引 ─── */

/* ─── オプションパネル ─── */

.opt-panel-body{padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.opt-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;background:#fafafa;border:1.5px solid var(--border);transition:.15s;cursor:pointer;}

/* ================================================================
   カスタム確認ダイアログ（confirm()の代替）
================================================================ */
function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),2000);
}


function customConfirm(msg, onOk){
  const overlay=document.createElement('div');
  overlay.className='confirm-overlay';
  overlay.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-msg">${msg}</div>
      <div class="confirm-btns">
        <button class="confirm-cancel">キャンセル</button>
        <button class="confirm-ok">削除する</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('.confirm-ok').onclick=()=>{document.body.removeChild(overlay);onOk();};
  overlay.querySelector('.confirm-cancel').onclick=()=>document.body.removeChild(overlay);
  overlay.onclick=(e)=>{if(e.target===overlay)document.body.removeChild(overlay);};
}


const MAT_PRESETS=['Tシャツ','ポロシャツ','スウェット','パーカー','ジャケット / ブルゾン','ベスト','キャップ / ハット','トートバッグ','エプロン','タオル','その他（自由入力）'];
const PROC_METHODS=[
  {v:'screen',       l:'スクリーンプリント'},
  {v:'garment_light',l:'ガーメントプリント（淡色）'},
  {v:'garment_dark', l:'ガーメントプリント（濃色）'},
  {v:'dtf',          l:'DTF転写'},

  {v:'rubber_full',  l:'プリントラバー転写'},
  {v:'embroidery',   l:'刺繍'},

];

/* ─── 刺繍 定義 ─── */
const EMB_TYPES=[
  {v:'emb_normal', l:'衣類（通常）',    rateM:0.20, rateS:0.30, fixed:false},
  {v:'emb_thick',  l:'衣類（厚物）',    rateM:0.22, rateS:0.33, fixed:false},
  {v:'emb_bag',    l:'バッグ類',         rateM:0.22, rateS:0.33, fixed:false},

  {v:'emb_wappen', l:'ワッペン',         rateM:0.12, rateS:0.18, fixed:false},
  {v:'emb_socks',  l:'靴下',             rateM:0,    rateS:0,    fixed:true, fixedM:800, fixedS:1500},
];
const EMB_LOC={
  emb_normal: ['前','後ろ','右袖','左袖','その他（自由入力）'],
  emb_thick:  ['前','後ろ','右袖','左袖','その他（自由入力）'],
  emb_bag:    ['片面','両面','自由入力'],
  emb_cap:    ['前','右側','左側','後ろ'],
  emb_cap3d:  ['前','右側','左側','後ろ'],
  emb_wappen: [],
  emb_socks:  [],
};
function calcEmbLine(embType, stitchCount, qty){
  const t=EMB_TYPES.find(e=>e.v===embType);
  if(!t) return 0;
  if(qty<=0) return 0;
  let unitCost;
  if(t.fixed){
    unitCost = qty===1 ? t.fixedS : t.fixedM;
  } else {
    if(!stitchCount||stitchCount<=0) return 0;
    const rate = qty===1 ? t.rateS : t.rateM;
    unitCost = Math.round(stitchCount * rate);
  }
  let total = unitCost * qty;
  // 枚数割引
  if(qty>=50) total = Math.round(total * 0.8);
  else if(qty>=20) total = Math.round(total * 0.9);
  return total;

function getUP(tbl,qty,sz){const bs=[200,150,100,50,30,20,10,2,1];for(const b of bs){if(qty>=b&&tbl[b]&&tbl[b][sz]!==undefined)return tbl[b][sz];}return 0;}
function getScreenUP(qty,col){const bs=[200,150,100,50,30,20,10];for(const b of bs){if(qty>=b)return(SCREEN_PRICE[b]&&SCREEN_PRICE[b][col])||0;}return 0;}
function calcProcLine(method,line,qty){
  if(method==='manual') return{cost:line.manualPrice||0,err:null};
  if(method==='embroidery'){
    if(!line.embType) return{cost:0,err:'品目未選択'};
    if(qty<=0) return{cost:0,err:'枚数0'};
    const t=EMB_TYPES.find(e=>e.v===line.embType);
    if(!t) return{cost:0,err:'品目不明'};
    if(!t.fixed&&(!line.stitchCount||line.stitchCount<=0)) return{cost:0,err:'針数未入力'};
    const c=calcEmbLine(line.embType, line.stitchCount||0, qty);
    return{cost:c,err:c?null:'価格なし'};
  }
  if(qty<=0) return{cost:0,err:'枚数0'};
  if(method==='screen'){
    const col=line.colors||1;
    if(qty>=6&&qty<=9) return{cost:0,err:'6〜9枚不可'};
    if(qty<=5){const up=(SCREEN_SAMPLE[qty]&&SCREEN_SAMPLE[qty][col])||0;const c=up*qty;return{cost:c,err:c?null:'価格なし'};}
    const c=getScreenUP(qty,col)*qty;
    return{cost:c,err:c?null:'価格なし'};
  }
  const tbl={garment_light:GARMENT_L,garment_dark:GARMENT_D,dtf:DTF,rubber:RUBBER,rubber_full:RUBBER_F}[method];
  if(!tbl) return{cost:0,err:'未選択'};
  const sz=line.size||0;if(!sz)return{cost:0,err:'サイズ未選択'};
  const c=getUP(tbl,qty,sz)*qty;
  return{cost:c,err:c?null:'価格なし'};
}

// 品番の大文字小文字を無視して検索するヘルパー
function findItemByCode(makerDB, code){
  if(!makerDB||!code) return null;
  // 完全一致を優先
  if(makerDB[code]) return {key:code, item:makerDB[code]};
  // 大文字変換で検索
  const upper=code.toUpperCase();
  if(makerDB[upper]) return {key:upper, item:makerDB[upper]};
  // 全キーを走査（ハイフン有無など吸収）
  for(const k of Object.keys(makerDB)){
    if(k.toUpperCase()===upper) return {key:k, item:makerDB[k]};
  }
  return null;
}

// 品番の部分一致検索（前方一致＋含む検索）
function searchCodes(makerDB, query){
  if(!makerDB||!query) return [];
  const q=query.toUpperCase();
  const results=[];
  for(const [code, item] of Object.entries(makerDB)){
    const cu=code.toUpperCase();
    if(cu.startsWith(q)){
      results.push({code, name:item.name, score:2}); // 前方一致は優先
    } else if(cu.includes(q)){
      results.push({code, name:item.name, score:1}); // 部分一致
    }
  }
  // スコア順 → 品番順でソート
  results.sort((a,b)=>b.score-a.score || a.code.localeCompare(b.code));
  return results.slice(0, 8); // 最大8件
}

// リアルタイム品番検索
function liveSearchCode(gId, rId){
  const row = matGroups.flatMap(g=>g.rows).find(r=>r.id===rId);
  if(!row) return;
  const makerDB = PRICE_DB[row.maker];
  if(!makerDB) return;
  const code = (row.code||'').trim();
  const popup = document.getElementById('pp-'+rId);
  if(!popup) return;

  // 空欄ならクリア
  if(!code){ popup.innerHTML=''; return; }

  // 価格選択済みならポップアップを出さない
  if(row.retail){ popup.innerHTML=''; return; }

  // 完全一致 → 価格選択ポップアップ
  const found = findItemByCode(makerDB, code);
  if(found){
    const item = found.item;
    const listHtml = item.prices.map((p,i)=>{
      const label = [p.size||'', p.color||''].filter(Boolean).join(' / ') || '共通';
      return `<div class="price-popup-item" onmousedown="applyPrice(${gId},${rId},${i})">
        <span class="pi-label">${label}</span>
        <span class="pi-price">¥${p.retail.toLocaleString()}</span>
      </div>`;
    }).join('');
    popup.innerHTML = `<div class="price-popup" id="ppdiv-${rId}">
      <span class="price-popup-close" onmousedown="closePopup(${rId})">×</span>
      <div class="price-popup-title">📦 ${item.name}</div>
      <div class="price-popup-list">${listHtml}</div>
    </div>`;
    return;
  }

  // 部分一致 → サジェストリスト
  if(code.length>=2){
    const candidates = searchCodes(makerDB, code);
    if(candidates.length>0){
      const listHtml = candidates.map(c=>
        `<div class="price-popup-item" onmousedown="pickSuggest(${gId},${rId},'${c.code}')">
          <span class="pi-label"><b>${c.code}</b>　${c.name}</span>
        </div>`
      ).join('');
      popup.innerHTML = `<div class="price-popup" id="ppdiv-${rId}">
        <span class="price-popup-close" onmousedown="closePopup(${rId})">×</span>
        <div class="price-popup-title">🔍 候補 ${candidates.length}件</div>
        <div class="price-popup-list">${listHtml}</div>
      </div>`;
      return;
    }
  }

  popup.innerHTML='';
}

// サジェスト候補を選択
function pickSuggest(gId, rId, code){
  const row = matGroups.flatMap(g=>g.rows).find(r=>r.id===rId);
  if(!row) return;
  // 品番をセット
  row.code = code;
  const codeInput = document.getElementById('fi-code-'+rId);
  if(codeInput) codeInput.value = code;
  // リセット（uMatRowのcode変更と同じ処理）
  row.prodName=''; row.retail=0; row.color=''; row.colorDetail='';

  if(tagEl){tagEl.textContent='';tagEl.style.display='none';}

  const retEl=document.getElementById('fi-retail-'+rId);

  // 価格ポップアップを表示

}

// サイズ・カラーから最適な上代を自動取得
function autoLookupRetail(row){
  const makerDB = PRICE_DB[row.maker];
  if(!makerDB) return null;
  const code = (row.code||'').trim();
  if(!code) return null;
  const found = findItemByCode(makerDB, code);
  if(!found||!found.item.prices.length) return null;
  const item = found.item;

  const sz = row.size||'';
  const cl = row.color||'';

  // サイズグループ判定
  function sizeGroup(s){
    if(!s) return '';
    if(/XXXL|4XL|5XL|6XL/.test(s)) return 'XXXL+';
    if(/^XXL$|^2XL$/.test(s)||s==='XXL') return 'XXL';
    if(/XS|^S$|^M$|^L$|^XL$/.test(s)) return 'small';
    return s;
  }
  // カラーグループ判定
  function colorGroup(c){
    if(!c) return '';
    if(c.includes('ホワイト')||c.toLowerCase()==='white') return 'ホワイト';
    if(c.includes('アッシュ')) return 'アッシュ';
    if(c.includes('ヘザー')) return 'ヘザーカラー';
    if(c.includes('ウッドランド')) return 'ウッドランド柄';
    return 'カラー';
  }

  const sg = sizeGroup(sz);
  const cg = colorGroup(cl);

  let best = null, bestScore = -1;
  for(const p of item.prices){
    let score = 0;
    const ps = p.size||'';
    const pc = p.color||'';

    // サイズスコア
    if(!ps){ score+=3; }
    else if(sg==='XXXL+'&&/XXXL/.test(ps)) score+=10;
    else if(sg==='XXL'&&/^XXL/.test(ps)) score+=10;
    else if(sg==='small'&&/XS|S\s*～|S\s*〜/.test(ps)) score+=10;
    else if(sz&&ps===sz) score+=10;
    else score+=0;

    // カラースコア
    if(!pc){ score+=2; }
    else if(cg&&pc.includes(cg)) score+=5;
    else if(cg==='カラー'&&!pc.includes('ホワイト')&&!pc.includes('アッシュ')&&!pc.includes('ヘザー')) score+=3;

    if(score>bestScore){ bestScore=score; best=p; }
  }
  return best?best.retail:null;
}

function applyPrice(gId, rId, priceIdx){
  const row = matGroups.flatMap(g=>g.rows).find(r=>r.id===rId);
  if(!row) return;
  const makerDB = PRICE_DB[row.maker];
  if(!makerDB) return;
  const found = findItemByCode(makerDB, (row.code||'').trim());
  if(!found) return;
  const item = found.item;
  const p = item.prices[priceIdx];
  if(!p) return;

  row.retail = p.retail;
  const retInput = document.getElementById('fi-retail-'+rId);
  if(retInput) retInput.value = p.retail;

  if(p.color && !row.color){
    row.color = p.color;
    const colorInput = document.getElementById('fi-color-'+rId);
    if(colorInput) colorInput.value = p.color;
  }

  // 商品名をセット
  row.prodName = item.name;
  const nameEl = document.getElementById('fi-prodname-'+rId);
  if(nameEl){ nameEl.textContent = item.name; nameEl.style.display=''; }

  // カラータグを更新
  const tagEl = document.getElementById('fi-colortag-'+rId);
  if(tagEl){
    if(p.color){ tagEl.textContent = p.color; tagEl.style.display=''; }
    else { tagEl.textContent=''; tagEl.style.display='none'; }
  }
  // 具体的な色名（「カラー」系の汎用語以外）なら詳細カラーに自動入力
  const genericColors = ['カラー','その他','mixed','other'];
  if(p.color && !genericColors.includes(p.color)){
    row.colorDetail = p.color;
    const detailEl = document.getElementById('fi-colordetail-'+rId);
    if(detailEl) detailEl.value = p.color;
  }

  closePopup(rId);
  updateTotals();
}

    <div class="mat-row-line1">
      <input id="fi-retail-${r.id}" class="mi num mr-retail" type="number" min="0" placeholder="上代" value="${r.retail||''}" oninput="uMatRow(${gId},${r.id},'retail',+this.value)">
      <span class="mr-unit">円</span>
      <select id="fi-disc-${r.id}" class="ms mr-disc" onchange="uMatRow(${gId},${r.id},'disc',+this.value)">${discOpts}</select>
      <input id="fi-qty-${r.id}" class="mi num mr-qty" type="number" min="0" placeholder="0" value="${r.qty||''}" oninput="uMatRow(${gId},${r.id},'qty',+this.value)">

    <div class="mat-row-line2">
      <span class="retail2" id="fi-retail2-${r.id}">${r.retail&&r.disc?`上代¥${r.retail.toLocaleString()}（${r.disc}%OFF）`:''}${unitStr?'　'+unitStr:''}</span>
      <span class="cost2" id="fi-res-${r.id}">${cost>0?'¥'+cost.toLocaleString():'—'}</span>

function addMatGroup(){matGroups.push(newMatGroup());renderMatGroups();updateTotals();}
function delMatGroup(id){
  const g=matGroups.find(g=>g.id===id);if(!g)return;
  if(g.rows.some(r=>r.qty||r.code)){customConfirm(`「${getMatGrpLabel(g)}」を削除しますか？`,()=>{matGroups=matGroups.filter(g=>g.id!==id);renderMatGroups();updateTotals();});return;}
  matGroups=matGroups.filter(g=>g.id!==id);renderMatGroups();updateTotals();
}
function dupMatRow(gId,rId){
  const g=matGroups.find(g=>g.id===gId);if(!g)return;
  const r=g.rows.find(r=>r.id===rId);if(!r)return;
  const idx=g.rows.indexOf(r);
  const dup={...r, id:++mid, size:'', sizeCustom:''};
  g.rows.splice(idx+1,0,dup);
  const container=document.getElementById(`mr-${gId}`);
  if(container){
    const t=document.createElement('div');
    t.innerHTML=renderMatRow(gId,dup);
    const origEl=document.getElementById(`mrow-${rId}`);
    if(origEl)origEl.after(t.firstElementChild);
  }
  refreshMatGrpHeader(gId);updateTotals();
}
function uMatGrpName(id,val){
  const g=matGroups.find(g=>g.id===id);if(!g)return;
  g.name=val;if(val!=='その他（自由入力）')g.customName='';
  const el=document.getElementById(`mg-${id}`);
  if(el){const t=document.createElement('div');t.innerHTML=renderMatGroup(g,matGroups.indexOf(g));el.replaceWith(t.firstElementChild);}
  updateTotals();
}
function uMatGrpCustom(id,val){const g=matGroups.find(g=>g.id===id);if(g)g.customName=val;updateTotals();}
function addMatRow(gId){
  const g=matGroups.find(g=>g.id===gId);if(!g)return;
  g.rows.push(newMatRow());
  document.getElementById(`mr-${gId}`).innerHTML=g.rows.map(r=>renderMatRow(gId,r)).join('');
  refreshMatGrpHeader(gId);updateTotals();
}
function delMatRow(gId,rId){
  const g=matGroups.find(g=>g.id===gId);if(!g)return;
  if(g.rows.length<=1){showToast('最低1行は必要です');return;}
  g.rows=g.rows.filter(r=>r.id!==rId);
  document.getElementById(`mr-${gId}`).innerHTML=g.rows.map(r=>renderMatRow(gId,r)).join('');
  refreshMatGrpHeader(gId);updateTotals();
}
/* フォーカス復元ヘルパー：DOM再生成前後でフォーカス・カーソル位置を保持 */
function withFocusRestore(fn){
  const ae=document.activeElement;
  const sid=ae?ae.id:null;
  // type="number" では selectionStart アクセスが TypeError を投げるため try-catch で保護
  let ss=null,se=null;
  try{if(ae){ss=ae.selectionStart;se=ae.selectionEnd;}}catch(e){}
  fn();
  if(sid){
    const el=document.getElementById(sid);
    if(el){
      el.focus();
      if(ss!=null){try{el.setSelectionRange(ss,se);}catch(e){}}
    }
  }
}


function uMatRow(gId,rId,key,val){
  const g=matGroups.find(g=>g.id===gId);if(!g)return;
  const r=g.rows.find(r=>r.id===rId);if(!r)return;
  r[key]=val;

  // 品番を手動変更したら商品名・価格・カラータグをクリア
  if(key==='code'){
    r.prodName=''; r.retail=0; r.color=''; r.colorDetail='';
    const nameEl=document.getElementById('fi-prodname-'+rId);
    if(nameEl){nameEl.textContent='';nameEl.style.display='none';}
    const tagEl=document.getElementById('fi-colortag-'+rId);
    if(tagEl){tagEl.textContent='';tagEl.style.display='none';}
    const detailEl=document.getElementById('fi-colordetail-'+rId);
    if(detailEl) detailEl.value='';
    const retEl=document.getElementById('fi-retail-'+rId);
    if(retEl) retEl.value='';
  }

  function updateResCell(r){
    const cost=calcMatRow(r);
    const unitPrice=r.retail&&r.disc?(r.retail*(1-r.disc/100)):0;
    const unitStr=unitPrice>0?`@ ¥${Math.round(unitPrice).toLocaleString()}`:'';
    const retail2=r.retail&&r.disc?`上代¥${Number(r.retail).toLocaleString()}（${r.disc}%OFF）${unitStr?'　'+unitStr:''}`:'';
    const res=document.getElementById(`fi-res-${r.id}`);
    const r2=document.getElementById(`fi-retail2-${r.id}`);
    if(res)res.textContent=cost>0?'¥'+cost.toLocaleString():'—';
    if(r2)r2.textContent=retail2;
    const rowEl=document.getElementById(`mrow-${r.id}`);
    if(rowEl){if(cost>0)rowEl.classList.add('has-val');else rowEl.classList.remove('has-val');}
  }

  if(key==='qty'){
    const tot=getTotalQty();
    allMatRows().forEach(row=>{
      if(row.maker==='WD'||row.maker==='OTHER'||row.maker==='CARRYOVER') return; // wundow・その他・持ち込みは固定
      if(row.disc===35||row.disc===40){
        const newDisc=tot>=200?40:35;
        if(row.disc!==newDisc){
          row.disc=newDisc;
          // DOM上のselectを直接更新（DOM再生成しない）
          const sel=document.getElementById(`fi-disc-${row.id}`);
          if(sel)sel.value=String(newDisc);
          // 2行目の小計・単価も更新
          const cost2=calcMatRow(row);
          const up2=row.retail&&row.disc?(row.retail*(1-row.disc/100)):0;
          const us2=up2>0?`@ ¥${Math.round(up2).toLocaleString()}`:'';
          const re2=row.retail&&row.disc?`上代¥${Number(row.retail).toLocaleString()}（${row.disc}%OFF）${us2?'　'+us2:''}`:'';
          const resEl=document.getElementById(`fi-res-${row.id}`);
          const r2El=document.getElementById(`fi-retail2-${row.id}`);
          if(resEl)resEl.textContent=cost2>0?'¥'+cost2.toLocaleString():'—';
          if(r2El)r2El.textContent=re2;
        }
      }
    });
    updateResCell(r);
    refreshMatGrpHeader(gId);
    // 加工代「合算」枚数をリアルタイム更新
    const newTot=getTotalQty();
    procGroups.forEach(g=>{
      g.lines.forEach(l=>{
        if(l.qtyMode!=='auto')return;
        const qv=document.getElementById(`pqv-${l.id}`);
        if(qv)qv.textContent=newTot+'枚';
        const{cost,err}=calcProcLine(g.method,l,newTot);
        const unitStr=newTot>0&&cost>0?`@ ¥${Math.round(cost/newTot).toLocaleString()}`:'';
        const isScreen=g.method==='screen';
        const isEmb=g.method==='embroidery';
        const needSize=['garment_light','garment_dark','dtf','rubber','rubber_full'].includes(g.method);
        const szOpts=(g.method==='garment_light'||g.method==='garment_dark')?SZ_G:SZ_D;
        const locLabel=(l.labelPreset==='その他（自由入力）'||l.labelPreset==='自由入力')?(l.labelCustom||''):l.labelPreset||'';
        const colorsLabel=isScreen?`${l.colors||1}色`:'';
        const sizeLabel=needSize?(szOpts.find(s=>s.v===l.size)||{l:''}).l:'';
        const embTypeLabel=isEmb?(EMB_TYPES.find(e=>e.v===l.embType)||{l:''}).l:'';
        const stitchLabel=isEmb&&l.stitchCount?`${l.stitchCount}針`:'';
        const discLabel=isEmb&&newTot>=50?'（2割引）':isEmb&&newTot>=20?'（1割引）':'';
        const detailParts=isEmb
          ?[getMethodLabel(g.method),embTypeLabel,locLabel,stitchLabel,discLabel].filter(Boolean)
          :[getMethodLabel(g.method),locLabel,colorsLabel,sizeLabel].filter(Boolean);
        const detailStr=detailParts.join('・')+(unitStr?'　'+unitStr:'');
        const pres=document.getElementById(`fi-pres-${l.id}`);
        const punit=document.getElementById(`fi-punit-${l.id}`);
        const lineEl=document.getElementById(`pl-${l.id}`);
        if(pres)pres.textContent=cost>0?'¥'+cost.toLocaleString():err&&err!=='枚数0'?'⚠ '+err:'—';
        if(punit)punit.textContent=detailStr;
        if(lineEl){if(cost>0)lineEl.classList.add('has-val');else lineEl.classList.remove('has-val');}
      });
    });
    refreshProcGrpHeaders();
  } else if(key==='retail'){
    updateResCell(r);
    refreshMatGrpHeader(gId);
  } else if(key==='disc'||key==='size'||key==='maker'||key==='color'){
    // メーカー変更時：新しいメーカーのサイズリストに現サイズがなければリセット
    if(key==='maker'){
      const newSizes=getSizesForMaker(val);
      if(!newSizes.find(s=>s.v===r.size))r.size=newSizes[0]?.v||'S';
      r.sizeCustom='';
      r.disc=getDefaultDisc(val);
      r.retail=''; // メーカー変更時は上代リセット
    }
    // サイズ・カラー変更時：価格DBから自動で上代を更新
    if(key==='size'||key==='color'){
      const newRetail=autoLookupRetail(r);
      if(newRetail!==null){
        r.retail=newRetail;
      }
    }
    const el=document.getElementById(`mrow-${rId}`);
    if(el){const t=document.createElement('div');t.innerHTML=renderMatRow(gId,r);el.replaceWith(t.firstElementChild);}
    refreshMatGrpHeader(gId);
  } else if(key==='sizeCustom'){
    // テキスト入力のみ → DOM再生成なし
  }
  updateTotals();
}

function refreshMatGrpHeader(gId){
  const g=matGroups.find(g=>g.id===gId);if(!g)return;
  const st=calcMatGroupTotal(g),qty=g.rows.reduce((s,r)=>s+(r.qty||0),0);
  const v=document.querySelector(`#mg-${gId} .grp-sub-val`);
  const q=document.querySelector(`#mg-${gId} .grp-sub-qty`);
  if(v)v.textContent=st>0?'¥'+st.toLocaleString():'—';
  if(q){q.textContent=qty>0?qty+'枚':'';q.style.display=qty>0?'':'none';}
}

function renderProcGroups(){document.getElementById('procGrpList').innerHTML=procGroups.map((g,i)=>renderProcGroup(g,i)).join('');}
function renderProcGroup(g,idx){
  const subtotal=calcProcGroupTotal(g);
  const isManual=g.method==='manual';
  const isScreen=g.method==='screen';
  const isEmb=g.method==='embroidery';
  const needSize=['garment_light','garment_dark','dtf','rubber','rubber_full'].includes(g.method);
  const methodOpts=PROC_METHODS.map(m=>`<option value="${m.v}"${g.method===m.v?' selected':''}>${m.l}</option>`).join('');
  const lines=g.lines.map(l=>renderProcLine(g,l)).join('');
  const addLabel=isManual?'＋ 行を追加（例：袖・胸ポケット）'
    :isEmb?'＋ 刺繍カ所を追加'
    :'＋ カ所を追加（前・後・袖など）';
  const bodyDisabled=!g.method;
  // 刺繍データ製作費欄
  const dataFeeHtml=isEmb?`
    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:8px;background:#f8f5ff;border:1.5px solid #e0d4f0;border-radius:8px;">
      <span style="font-size:12px;font-weight:700;color:#6a35c0;white-space:nowrap;">🧵 刺繍データ製作費</span>
      <input class="pl-num" type="number" min="0" placeholder="0" value="${g.dataFee||''}"
        oninput="uEmbDataFee(${g.id},+this.value)" style="width:100px;">
      <span style="font-size:11px;color:var(--sub);">円</span>
      ${g.dataFee>0?`<span style="font-size:12px;font-weight:700;color:#6a35c0;margin-left:auto;">¥${g.dataFee.toLocaleString()}</span>`:''}
    </div>`:'';
  return `<div class="grp proc-grp" id="pg-${g.id}">
    <div class="grp-hdr">
      <span class="grp-num blue">${idx+1}</span>
      <div class="proc-method-wrap">
        <select class="proc-method-sel${bodyDisabled?' sel-empty':''}" onchange="uProcGrpMethod(${g.id},this.value)">
          <option value="">加工方法を選択</option>${methodOpts}
        </select>
      </div>
      <div class="grp-subtotal">
        <span class="grp-sub-val blue" id="pg-val-${g.id}">${subtotal>0?'¥'+subtotal.toLocaleString():'—'}</span>
      </div>
      <button class="grp-del-btn" onclick="delProcGroup(${g.id})">🗑</button>
    </div>
    <div class="grp-body${bodyDisabled?' grp-body-disabled':''}">
      ${bodyDisabled
        ?`<div class="grp-disabled-msg">👆 加工方法を選択してください</div>`
        :`${dataFeeHtml}<div class="proc-line-rows" id="plc-${g.id}">${lines}</div>
          <button class="add-btn blue" onclick="addProcLine(${g.id})">${addLabel}</button>`
      }
    </div>
  </div>`;
}
function renderProcLine(g,l){
  const qty=getProcLineQty(l);
  const{cost,err}=calcProcLine(g.method,l,qty);
  const isManual=g.method==='manual';
  const isScreen=g.method==='screen';
  const isEmb=g.method==='embroidery';
  const needSize=['garment_light','garment_dark','dtf','rubber','rubber_full'].includes(g.method);
  const szOpts=(g.method==='garment_light'||g.method==='garment_dark')?SZ_G:SZ_D;
  const autoQty=getTotalQty();
  let rh;
  if(err&&err!=='枚数0')rh=`<span class="r-err">⚠ ${err}</span>`;
  else if(cost>0)rh=`<span class="r-val">¥${cost.toLocaleString()}</span>`;
  else rh=`<span class="r-pend">—</span>`;
  const isCustomLoc=l.labelPreset==='その他（自由入力）'||l.labelPreset==='自由入力';

  // カ所選択肢（刺繍は品目に応じて変わる）
  const locPresets=isEmb?(EMB_LOC[l.embType]||[]):LOCATION_PRESETS;
  const locOpts=locPresets.map(p=>`<option value="${esc(p)}"${l.labelPreset===p?' selected':''}>${p}</option>`).join('');
  const hasLoc=locPresets.length>0;

  // ラベルブロック構築
  let labelBlock;
  if(isManual){
    labelBlock=`<input id="fi-plabel-${l.id}" class="pl-label" style="min-width:120px" type="text" placeholder="内容（例：袖刺繍・胸ポケット）"
        value="${esc(l.labelCustom||l.labelPreset)}" oninput="uProcLine(${g.id},${l.id},'labelCustom',this.value)">`;
  } else if(isEmb){
    // 刺繍：品目選択 + カ所選択 + 針数入力
    const embTypeOpts=EMB_TYPES.map(e=>`<option value="${e.v}"${l.embType===e.v?' selected':''}>${e.l}</option>`).join('');
    const embT=EMB_TYPES.find(e=>e.v===l.embType);
    const needStitch=embT&&!embT.fixed;
    labelBlock=`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px;width:100%;">
      <select class="pl-sel" style="min-width:130px" onchange="uProcLine(${g.id},${l.id},'embType',this.value)">
        ${embTypeOpts}
      </select>
      ${hasLoc?`<select class="pl-sel" style="min-width:80px" onchange="uProcLine(${g.id},${l.id},'labelPreset',this.value)">
        <option value="">カ所</option>${locOpts}
      </select>`:''}
      ${isCustomLoc?`<input id="fi-ploc-${l.id}" class="pl-label" style="width:90px" type="text" placeholder="カ所名"
        value="${esc(l.labelCustom)}" oninput="uProcLine(${g.id},${l.id},'labelCustom',this.value)">`:''}
      ${needStitch?`<input id="fi-stitch-${l.id}" class="pl-num" type="number" min="0" placeholder="針数" inputmode="numeric"
        value="${l.stitchCount||''}" oninput="uProcLine(${g.id},${l.id},'stitchCount',+this.value)" style="width:90px;">
        <span style="font-size:11px;color:var(--sub);white-space:nowrap">針</span>`:''}
    </div>`;
  } else {
    labelBlock=`<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
        <select class="pl-sel" style="min-width:105px" onchange="uProcLine(${g.id},${l.id},'labelPreset',this.value)">
          <option value="">プリントカ所を選択</option>${locOpts}
        </select>
        ${isCustomLoc?`<input id="fi-ploc-${l.id}" class="pl-label" style="width:90px" type="text" placeholder="カ所名を入力"
          value="${esc(l.labelCustom)}" oninput="uProcLine(${g.id},${l.id},'labelCustom',this.value)">`:''}
      </div>`;
  }

  const unitStr=cost>0&&qty>0?`@ ¥${Math.round(cost/qty).toLocaleString()}`:'';
  // 詳細テキスト
  const methodLabel=getMethodLabel(g.method);
  const locLabel=isManual
    ?(l.labelCustom||l.labelPreset||'')
    :(isCustomLoc?(l.labelCustom||''):l.labelPreset||'');
  const colorsLabel=isScreen?`${l.colors||1}色`:'';
  const sizeLabel=needSize?(szOpts.find(s=>s.v===l.size)||{l:''}).l:'';
  const embTypeLabel=isEmb?(EMB_TYPES.find(e=>e.v===l.embType)||{l:''}).l:'';
  const stitchLabel=isEmb&&l.stitchCount?`${l.stitchCount}針`:'';
  const discLabel=isEmb&&qty>=50?'（2割引）':isEmb&&qty>=20?'（1割引）':'';
  const detailParts=isEmb
    ?[methodLabel,embTypeLabel,locLabel,stitchLabel,discLabel].filter(Boolean)
    :[methodLabel,locLabel,colorsLabel,sizeLabel].filter(Boolean);
  const detailStr=detailParts.join('・')+(unitStr?'　'+unitStr:'');
  return `<div class="proc-line${cost>0?' has-val':''}" id="pl-${l.id}">
    <div class="proc-line-top">
      ${labelBlock}
      ${isScreen?`
        <select class="pl-sel" onchange="uProcLine(${g.id},${l.id},'colors',+this.value)">
          ${[1,2,3,4,5,6,7,8].map(n=>`<option value="${n}"${l.colors===n?' selected':''}>${n}色</option>`).join('')}
        </select>`:''}
      ${needSize?`
        <select class="pl-sel" onchange="uProcLine(${g.id},${l.id},'size',+this.value)">
          ${szOpts.map(s=>`<option value="${s.v}"${l.size===s.v?' selected':''}>${s.l}</option>`).join('')}
        </select>`:''}
      ${isManual?`
        <input id="fi-pmanual-${l.id}" class="pl-num" type="number" min="0" placeholder="金額"
          value="${l.manualPrice||''}" oninput="uProcLine(${g.id},${l.id},'manualPrice',+this.value)">
        <span style="font-size:11px;color:var(--sub);white-space:nowrap">円</span>
      `:`
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
          <span style="font-size:11px;color:var(--sub);white-space:nowrap">枚数</span>
          <div class="qty-toggle">
            <button class="${l.qtyMode==='auto'?'on':''}" onclick="uProcLine(${g.id},${l.id},'qtyMode','auto')">合算</button>
            <button class="${l.qtyMode==='manual'?'on':''}" onclick="uProcLine(${g.id},${l.id},'qtyMode','manual')">手動</button>
          </div>
          ${l.qtyMode==='auto'
            ?`<span class="qty-val" id="pqv-${l.id}">${autoQty}枚</span>`
            :`<input id="fi-pqty-${l.id}" class="pl-num" style="width:66px" type="number" min="0" placeholder="0"
                value="${l.qtyManual||''}" oninput="uProcLine(${g.id},${l.id},'qtyManual',+this.value)">
              <span style="font-size:11px;color:var(--sub)">枚</span>`}
        </div>
      `}
      <div style="display:flex;gap:2px;flex-shrink:0;margin-left:auto;">
        <button class="dup-btn" title="この行を複製" onclick="dupProcLine(${g.id},${l.id})">⧉</button>
        <button class="del-btn" onclick="delProcLine(${g.id},${l.id})">✕</button>
      </div>
    </div>
    <div class="proc-line-bottom">
      <span class="detail2b" id="fi-punit-${l.id}">${detailStr}</span>
      <span class="cost2b" id="fi-pres-${l.id}">${cost>0?'¥'+cost.toLocaleString():err&&err!=='枚数0'?'⚠ '+err:'—'}</span>
    </div>
  </div>`;
}

function uProcGrpMethod(id,val){
  const g=procGroups.find(g=>g.id===id);if(!g)return;
  const wasEmpty=!g.method;
  g.method=val;
  if(wasEmpty||val===''){
    g.lines=[defaultProcLine(val)];
    g.dataFee=0;
  } else {
    g.lines.forEach(l=>{delete l.colors;delete l.size;delete l.manualPrice;delete l.embType;delete l.stitchCount;
      if(val==='screen')l.colors=2;
      else if(val==='embroidery'){l.embType='emb_normal';l.stitchCount=0;}
      else if(val!=='manual')l.size=315;});
    if(val!=='embroidery') g.dataFee=0;
  }
  const el=document.getElementById(`pg-${id}`);
  if(el){const t=document.createElement('div');t.innerHTML=renderProcGroup(g,procGroups.indexOf(g));el.replaceWith(t.firstElementChild);}
  renderOptions();updateTotals();
}
function uEmbDataFee(gId,val){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  g.dataFee=val;
  refreshProcGrpHeader(gId);
  updateTotals();
}
function addProcLine(gId){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  g.lines.push(defaultProcLine(g.method));
  document.getElementById(`plc-${gId}`).innerHTML=g.lines.map(l=>renderProcLine(g,l)).join('');
  refreshProcGrpHeader(gId);updateTotals();
}
function delProcLine(gId,lId){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  if(g.lines.length<=1){showToast('最低1行は必要です');return;}
  g.lines=g.lines.filter(l=>l.id!==lId);
  document.getElementById(`plc-${gId}`).innerHTML=g.lines.map(l=>renderProcLine(g,l)).join('');
  refreshProcGrpHeader(gId);updateTotals();
}
function dupProcLine(gId,lId){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  const idx=g.lines.findIndex(l=>l.id===lId);if(idx<0)return;
  const orig=g.lines[idx];
  const dup={...orig,id:++plid,qtyManual:orig.qtyManual||0,labelCustom:orig.labelCustom||''};
  g.lines.splice(idx+1,0,dup);
  document.getElementById(`plc-${gId}`).innerHTML=g.lines.map(l=>renderProcLine(g,l)).join('');
  refreshProcGrpHeader(gId);updateTotals();
}
function uProcLine(gId,lId,key,val){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  const l=g.lines.find(l=>l.id===lId);if(!l)return;
  l[key]=val;

  if(key==='labelCustom'){
    // テキスト入力 → DOM再生成なし
    updateTotals();return;
  }
  if(key==='embType'){
    // 刺繍品目変更 → カ所リストが変わるのでlabelPresetをリセット
    l.labelPreset='';l.labelCustom='';
    // DOM再描画
    withFocusRestore(()=>{
      const el=document.getElementById(`pl-${lId}`);
      if(el){const t=document.createElement('div');t.innerHTML=renderProcLine(g,l);el.replaceWith(t.firstElementChild);}
      refreshProcGrpHeader(gId);
    });
    updateTotals();return;
  }
  if(key==='manualPrice'||key==='qtyManual'||key==='stitchCount'){
    // 数値入力 → 結果表示だけ更新（DOM再生成なし）
    const qty=getProcLineQty(l);
    const{cost,err}=calcProcLine(g.method,l,qty);
    const unitStr=cost>0&&qty>0?`@ ¥${Math.round(cost/qty).toLocaleString()}`:'';
    const isScreen=g.method==='screen';
    const isEmb=g.method==='embroidery';
    const needSize=['garment_light','garment_dark','dtf','rubber','rubber_full'].includes(g.method);
    const szOpts=(g.method==='garment_light'||g.method==='garment_dark')?SZ_G:SZ_D;
    const locLabel=g.method==='manual'
      ?(l.labelCustom||l.labelPreset||'')
      :((l.labelPreset==='その他（自由入力）'||l.labelPreset==='自由入力')?(l.labelCustom||''):l.labelPreset||'');
    const colorsLabel=isScreen?`${l.colors||1}色`:'';
    const sizeLabel=needSize?(szOpts.find(s=>s.v===l.size)||{l:''}).l:'';
    const embTypeLabel=isEmb?(EMB_TYPES.find(e=>e.v===l.embType)||{l:''}).l:'';
    const stitchLabel=isEmb&&l.stitchCount?`${l.stitchCount}針`:'';
    const discLabel=isEmb&&qty>=50?'（2割引）':isEmb&&qty>=20?'（1割引）':'';
    const detailParts=isEmb
      ?[getMethodLabel(g.method),embTypeLabel,locLabel,stitchLabel,discLabel].filter(Boolean)
      :[getMethodLabel(g.method),locLabel,colorsLabel,sizeLabel].filter(Boolean);
    const detailStr=detailParts.join('・')+(unitStr?'　'+unitStr:'');
    const res=document.getElementById(`fi-pres-${lId}`);
    const unitEl=document.getElementById(`fi-punit-${lId}`);
    if(res)res.textContent=cost>0?'¥'+cost.toLocaleString():err&&err!=='枚数0'?'⚠ '+err:'—';
    if(unitEl)unitEl.textContent=detailStr;
    const lineEl=document.getElementById(`pl-${lId}`);
    if(lineEl){if(cost>0)lineEl.classList.add('has-val');else lineEl.classList.remove('has-val');}
    refreshProcGrpHeader(gId);
    updateTotals();return;
  }
  // セレクト変更・モード切替など → 行再描画
  withFocusRestore(()=>{
    const el=document.getElementById(`pl-${lId}`);
    if(el){const t=document.createElement('div');t.innerHTML=renderProcLine(g,l);el.replaceWith(t.firstElementChild);}
    refreshProcGrpHeader(gId);
  });
  updateTotals();
}
function refreshProcGrpHeader(gId){
  const g=procGroups.find(g=>g.id===gId);if(!g)return;
  const st=calcProcGroupTotal(g);
  const v=document.getElementById(`pg-val-${gId}`);
  if(v)v.textContent=st>0?'¥'+st.toLocaleString():'—';
}
function refreshProcGrpHeaders(){
  procGroups.forEach(g=>refreshProcGrpHeader(g.id));
}

function getStickerTotal(sizeV,qty){

  const bs=[300,250,200,150,100,90,80,70,60,50,40,30,20,10,5];

  return 0;
}

  if(!sizeId||!qty)return 0;

  for(const b of bs){if(qty>=b&&tbl[b]!==undefined)return tbl[b];}

}

  if(g.type==='sticker')  return getStickerTotal(g.size,g.qty);
  if(g.type==='keychain') return getKeychainUnit(g.size,g.qty)*g.qty;
  if(g.type==='other')    return g.manualPrice||0;

}

function uGoods(id,key,val){
  const g=goodsGroups.find(g=>g.id===id);if(!g)return;
  g[key]=val;

  if(key==='manualName'){
    // テキスト入力 → DOM再生成なし
    updateTotals();return;

  if(key==='qty'||key==='manualPrice'){
    // 数値入力 → 結果表示だけ更新（DOM再生成なし）
    const cost=calcGoodsGroup(g);
    const rh=cost>0?`<span class="r-val" style="color:#7a30c0;">¥${cost.toLocaleString()}</span>`:`<span class="r-pend">—</span>`;

    if(rowEl){if(cost>0)rowEl.classList.add('has-val');else rowEl.classList.remove('has-val');}
    // noteスパン（合計・単価）も更新
    const noteEl=document.querySelector(`#gg-${id} .goods-note`);
    if(noteEl){
      if(g.type==='sticker'&&g.size&&g.qty>=5)
        noteEl.textContent=`合計: ¥${getStickerTotal(g.size,g.qty).toLocaleString()}`;
      else if(g.type==='keychain'&&g.size&&g.qty>=10){
        const u=getKeychainUnit(g.size,g.qty);
        noteEl.textContent=`@¥${u.toLocaleString()} × ${g.qty}個`;

    updateTotals();return;
  }
  // size変更などはDOM再生成
  withFocusRestore(()=>{
    const el=document.getElementById(`gg-${id}`);
    if(el){const t=document.createElement('div');t.innerHTML=renderGoodsGroup(g,goodsGroups.indexOf(g));el.replaceWith(t.firstElementChild);}

}

const EXTRA_OPTS = [

  { id:'tag',     name:'タグ製作・取付（昇華リボン／35mm幅）', desc:'10〜99枚 @¥450 ／ 100枚以上 @¥350', type:'tag' },
];
// extraOptState: { tag: bool, bagging: bool, baggingMode: 'all70'|'all10'|'mixed', baggingQty70: number, baggingQty10: number }
let extraOptState = { baggingMode:'all70', baggingQty70:0, baggingQty10:0 };

function calcTagPrice(qty){
  if(qty<=0) return 0;
  if(qty<100) return qty*450;
  return qty*350;
}
function calcBaggingCost(){
  if(!extraOptState['bagging']) return 0;
  const mode=extraOptState.baggingMode||'all70';
  const totalQty=getTotalQty();
  if(mode==='all70')  return totalQty*70;
  if(mode==='all10')  return totalQty*10;
  // mixed
  const q70=extraOptState.baggingQty70||0;
  const q10=extraOptState.baggingQty10||0;
  return q70*70+q10*10;
}
function calcExtraOptCost(){
  let total=0;
  if(extraOptState['tag'])     total+=calcTagPrice(getTotalQty());
  total+=calcBaggingCost();
  return total;
}

function renderExtraOpts(){
  const qty=getTotalQty();
  const html=EXTRA_OPTS.map(opt=>{
    const checked=!!extraOptState[opt.id];

    if(opt.type==='bagging'){
      const mode=extraOptState.baggingMode||'all70';
      const cost=calcBaggingCost();
      const costStr=checked&&cost>0?`<span class="opt-cost" style="color:#6a35c0;">+¥${cost.toLocaleString()}</span>`:'';
      const subUI=checked?`
        <div onclick="event.stopPropagation()" style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="radio" name="bagging-mode" value="all70" ${mode==='all70'?'checked':''} onchange="setBaggingMode('all70')">

// オプション選択状態: { [method]: { [optId]: bool } }
let optState = {};

function getOptState(method,optId){return !!(optState[method]&&optState[method][optId]);}
function setOptState(method,optId,val,isRadio){
  if(!optState[method])optState[method]={};
  if(isRadio){
    // ラジオ: 同グループを全解除してから選択（再クリックで解除）
    const cur=optState[method][optId];
    Object.keys(optState[method]).forEach(k=>optState[method][k]=false);
    optState[method][optId]=!cur;
  } else {
    optState[method][optId]=val;
  }
}

/* オプションコスト計算 */
function calcOptCost(){
  let total=0;
  const methods=[...new Set(procGroups.map(g=>g.method))];
  methods.forEach(method=>{
    const opts=OPT_BY_METHOD[method];if(!opts)return;
    const procGrpsOfMethod=procGroups.filter(g=>g.method===method);
    const baseCost=procGrpsOfMethod.reduce((s,g)=>s+calcProcGroupTotal(g),0);
    opts.forEach(opt=>{
      if(!getOptState(method,opt.id))return;
      if(opt.type==='per_sheet_loc'){
        // 枚数 × カ所数（各グループの行数の合計）
        const qty=getTotalQty();
        const locs=procGrpsOfMethod.reduce((s,g)=>s+g.lines.length,0);
        total+=opt.price*qty*locs;
      } else if(opt.type==='multiplier'){
        total+=Math.round(baseCost*(opt.multiplier-1));
      } else if(opt.type==='fixed'){
        total+=opt.price;
      } else if(opt.type==='radio_mult'){
        total+=Math.round(baseCost*(opt.multiplier-1));
      }
    });
  });
  return total;
}

/* オプション描画 */
function renderOptions(){
  const methods=[...new Set(procGroups.map(g=>g.method))].filter(m=>OPT_BY_METHOD[m]&&OPT_BY_METHOD[m].length>0);
  const sec=document.getElementById('optionSec');
  const body=document.getElementById('optionBody');
  if(methods.length===0){sec.style.display='none';return;}
  sec.style.display='';

  body.innerHTML=methods.map(method=>{
    const opts=OPT_BY_METHOD[method];
    const procGrpsOfMethod=procGroups.filter(g=>g.method===method);
    const baseCost=procGrpsOfMethod.reduce((s,g)=>s+calcProcGroupTotal(g),0);
    const qty=getTotalQty();

    const items=opts.map(opt=>{
      const checked=getOptState(method,opt.id);
      const isRadio=(opt.type==='radio_mult');
      // コスト表示
      let costStr='';
      if(checked){
        let c=0;
        if(opt.type==='per_sheet_loc'){
          const locs=procGrpsOfMethod.reduce((s,g)=>s+g.lines.length,0);
          c=opt.price*qty*locs;
        } else if(opt.type==='multiplier'||opt.type==='radio_mult'){
          c=Math.round(baseCost*(opt.multiplier-1));
        } else if(opt.type==='fixed'){
          c=opt.price;
        }
        costStr=`<span class="opt-cost">+¥${c.toLocaleString()}</span>`;
      }
      const indicator=isRadio
        ?`<span class="opt-radio"></span>`
        :`<span class="opt-check">${checked?'✓':''}</span>`;
      return `<div class="opt-item${checked?' checked':''}" onclick="toggleOpt('${method}','${opt.id}',${isRadio})">
        ${indicator}
        <div class="opt-info">
          <div class="opt-name">${esc(opt.name)}</div>
          <div class="opt-desc">${esc(opt.desc)}</div>
        </div>
        ${costStr}
      </div>`;
    }).join('');

    return `<div class="opt-panel">
      <div class="opt-panel-hdr">
        <span class="opt-panel-ttl">✨ ${esc(OPT_METHOD_LABEL[method]||method)} のオプション</span>
        ${baseCost===0?`<span class="opt-panel-sub">※加工代が0の場合は倍率計算できません</span>`:''}
      </div>
      <div class="opt-panel-body">${items}</div>
    </div>`;
  }).join('');
}

function toggleOpt(method,optId,isRadio){
  const cur=getOptState(method,optId);
  setOptState(method,optId,!cur,isRadio);
  renderOptions();
  updateTotals();
}

function updateTotals(){
  const mat=totalMat(),proc=totalProc(),opt=calcOptCost(),extra=calcExtraOptCost(),goods=totalGoods();
  const apparel=mat+proc+opt+extra;
  const sub=apparel+goods,tax=Math.floor(sub*0.1),grand=sub+tax;
  const totalQty=getTotalQty();
  const f=n=>'¥'+n.toLocaleString();

  document.getElementById('matBadge').textContent=f(mat);
  document.getElementById('procBadge').textContent=f(proc);
  document.getElementById('matTotal').textContent=f(mat);
  document.getElementById('procTotal').textContent=f(proc);
  document.getElementById('apparelBadge').textContent=f(apparel);
  document.getElementById('goodsBadge').textContent=f(goods);
  document.getElementById('goodsTotal').textContent=f(goods);
  document.getElementById('matQtyNote').textContent=totalQty>0?`合計 ${totalQty}枚 ／`:'';
  renderExtraOpts();

  // 左列：内訳
  let left='';
  left+=`<div class="sr sec-total"><span class="sl">素材代</span><span class="sv">${f(mat)}</span></div>`;
  left+=`<div class="sr sec-total"><span class="sl">加工代</span><span class="sv">${f(proc)}</span></div>`;
  if(opt>0)   left+=`<div class="sr sec-total"><span class="sl">プリントOP</span><span class="sv">${f(opt)}</span></div>`;
  if(extra>0) left+=`<div class="sr sec-total"><span class="sl">オプション</span><span class="sv">${f(extra)}</span></div>`;
  if(goods>0) left+=`<div class="sr sec-total"><span class="sl">グッズ</span><span class="sv">${f(goods)}</span></div>`;
  document.getElementById('sumColLeft').innerHTML=left;

  // 中央：合計金額
  document.getElementById('sumGrand').innerHTML=
    `<div class="sr grand"><span class="sl">合計</span><span class="sv">${f(grand)}</span><span class="su">（税込）</span></div>`;

  // per枚単価（税抜/税込のみ、per枚表記なし）
  if(totalQty>0&&sub>0){
    const u=Math.ceil(sub/totalQty),ut=Math.ceil(grand/totalQty);
    document.getElementById('unitNote').textContent=`@ ¥${u.toLocaleString()}（税抜）/ ¥${ut.toLocaleString()}（税込）`;
  }else{
    document.getElementById('unitNote').textContent='';
  }

  // 右列：小計・消費税
  let right='';
  right+=`<div class="sr"><span class="sl">小計（税抜）</span><span class="sv">${f(sub)}</span></div>`;
  right+=`<div class="sr"><span class="sl">消費税10%</span><span class="sv">${f(tax)}</span></div>`;
  document.getElementById('sumColRight').innerHTML=right;

  // フッター高さに合わせてページ余白を動的調整
  requestAnimationFrame(()=>{
    const footer=document.getElementById('sumFooter');
    const wrap=document.querySelector('.wrap');
    if(footer&&wrap)wrap.style.paddingBottom=(footer.offsetHeight+24)+'px';
  });
}

/* ================================================================
   Misocaコピー
================================================================ */
function copyToClipboard(){
  const btn=document.getElementById('copyBtn');
  const rows=[];
  const tab='\t';
  const push=(name,qty,unit,price)=>rows.push([name,qty??'',unit??'',price??''].join(tab));
  const blank=()=>rows.push('');

  // ── 素材代：各行に「グループ名　品番　カラー／サイズ」を統合 ──
  let matHasContent=false;
  matGroups.forEach(g=>{
    if(!g.name)return;
    const grpLabel=getMatGrpLabel(g);
    const code=g.rows.find(r=>r.code)?.code||'';

    g.rows.forEach(r=>{
      if(!r.qty&&!r.retail)return;
      const sizeLabel=r.size==='OTHER'?(r.sizeCustom||'その他'):r.size;
      const colorDisplay=r.colorDetail||'';
      const colorSize=[colorDisplay,sizeLabel].filter(Boolean).join('／');
      const makerLabel=r.maker==='CARRYOVER'?(r.makerCustom||'持ち込み'):(MAKERS.find(m=>m.v===r.maker)||{l:''}).l;
      const makerStr=makerLabel?`${makerLabel}　`:'';
      const codeStr=code?`${code}　`:'';
      push(`${grpLabel}　${makerStr}${codeStr}${colorSize}`,r.qty||0,'枚',r.retail||0);
      matHasContent=true;
    });

    // 割引行
    const grpTotal=calcMatGroupTotal(g);
    const totalRetail=g.rows.reduce((s,r)=>s+(r.retail||0)*(r.qty||0),0);
    const discAmt=totalRetail-grpTotal;
    if(discAmt>0){
      const discRate=g.rows[0]?.disc||0;
      push(`　ボディ割引（${discRate}%オフ）`,1,'',Math.round(-discAmt));
    }
  });

  // ── 加工代 ──
  let procHasContent=false;
  const procLines=[];
  procGroups.forEach(g=>{
    if(!g.method)return;
    const methodLabel=getMethodLabel(g.method);
    const isEmb=g.method==='embroidery';
    // 刺繍データ製作費
    if(isEmb&&g.dataFee>0){
      procLines.push(['刺繍データ製作費',1,'式',g.dataFee]);
      procHasContent=true;
    }
    g.lines.forEach(l=>{
      const qty=getProcLineQty(l);
      const{cost}=calcProcLine(g.method,l,qty);
      if(!cost)return;
      const locLabel=(l.labelPreset==='その他（自由入力）'||l.labelPreset==='自由入力')?(l.labelCustom||'その他'):l.labelPreset||'';
      const isScreen=g.method==='screen';
      const needSize=['garment_light','garment_dark','dtf','rubber','rubber_full'].includes(g.method);
      const szOpts=(g.method==='garment_light'||g.method==='garment_dark')?SZ_G:SZ_D;
      const colorsLabel=isScreen?`${l.colors||1}色`:'';
      const sizeLabel=needSize?(szOpts.find(s=>s.v===l.size)||{l:''}).l:'';
      let name;
      if(g.method==='manual'){
        name=l.labelCustom||l.labelPreset||methodLabel;
      } else if(isEmb){
        const embTypeLabel=(EMB_TYPES.find(e=>e.v===l.embType)||{l:''}).l;
        const stitchLabel=l.stitchCount?`${l.stitchCount}針`:'';
        name=[methodLabel,embTypeLabel,locLabel,stitchLabel].filter(Boolean).join('　');
      } else {
        name=[methodLabel,locLabel,colorsLabel,sizeLabel].filter(Boolean).join('　');
      }
      const unitPrice=qty>0?Math.round(cost/qty):0;
      procLines.push([name,qty,'枚',unitPrice]);
      procHasContent=true;
    });
  });

  // ── プリントオプション ──
  const optLines=[];
  const optTotal=calcOptCost();
  if(optTotal>0){
    const totalQtyForOpt=getTotalQty();
    const optMethods=[...new Set(procGroups.map(g=>g.method))];
    optMethods.forEach(method=>{
      if(!method)return;
      const opts=OPT_BY_METHOD[method]||[];
      const sel=optState[method]||{};
      const procGrpsOfMethod=procGroups.filter(pg=>pg.method===method);
      const baseCost=procGrpsOfMethod.reduce((s,pg)=>s+calcProcGroupTotal(pg),0);
      opts.forEach(opt=>{
        if(!sel[opt.id])return;
        let cost=0;
        if(opt.type==='per_sheet_loc'){
          const locs=procGrpsOfMethod.reduce((s,pg)=>s+pg.lines.length,0);
          cost=opt.price*totalQtyForOpt*locs;
        } else if(opt.type==='multiplier'||opt.type==='radio_mult'){
          cost=Math.round(baseCost*(opt.multiplier-1));
        } else if(opt.type==='fixed'){
          cost=opt.price;
        }
        if(cost>0) optLines.push([opt.name,1,'式',cost]);
      });
    });
  }

  // ── オプション（袋詰め・タグ）──
  const extraLines=[];
  const extraTotal=calcExtraOptCost();
  if(extraTotal>0){
    const qty=getTotalQty();
    // 袋詰め
    if(extraOptState['bagging']){
      const mode=extraOptState.baggingMode||'all70';
      if(mode==='all70'){
        extraLines.push(['袋詰め',qty,'枚',70]);
      } else if(mode==='all10'){
        extraLines.push(['袋のみ',qty,'枚',10]);
      } else {
        const q70=extraOptState.baggingQty70||0;
        const q10=extraOptState.baggingQty10||0;
        if(q70>0) extraLines.push(['袋詰め',q70,'枚',70]);
        if(q10>0) extraLines.push(['袋のみ',q10,'枚',10]);
      }
    }
    // タグ
    if(extraOptState['tag']){
      const price=calcTagPrice(qty);
      if(price>0){
        const up=qty>0?Math.round(price/qty):0;
        extraLines.push(['タグ製作・取付（昇華リボン／35mm幅）',qty,'枚',up]);
      }
    }
  }

  // ── グッズ ──
  const goodsLines=[];
  const gTotal=totalGoods();
  if(gTotal>0){
    goodsGroups.forEach(g=>{
      const cost=calcGoodsGroup(g);
      if(!cost)return;
      const label=g.type==='sticker'?`ステッカー（${g.size||''}㎠）`
        :g.type==='keychain'?`アクリルキーホルダー（${g.size||''}mm）`
        :(g.manualName||'グッズ');
      const qty=g.qty||1;
      const unitPrice=Math.round(cost/qty);
      goodsLines.push([label,qty,'個',unitPrice]);
    });
  }

  // ── 出力：素材はすでにrowsに直接追加済み ──
  // procとoptとextraをまとめて出力
  const allProc=[...procLines,...optLines,...extraLines];
  if(allProc.length>0){
    if(rows.length>0)blank();
    allProc.forEach(r=>rows.push(r.join(tab)));
  }
  if(goodsLines.length>0){
    if(rows.length>0)blank();
    goodsLines.forEach(r=>rows.push(r.join(tab)));
  }

  const text=rows.join('\n');

  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✅ コピーしました！';
    btn.style.background='rgba(64,223,171,.35)';
    btn.style.color='#40dfab';
    setTimeout(()=>{btn.textContent='📋 テキストをコピー';btn.style.background='';btn.style.color='';},2500);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent='✅ コピーしました！';
    setTimeout(()=>{btn.textContent='📋 テキストをコピー';},2500);
  });
}

  const btn=document.getElementById('imgBtn');
  btn.disabled=true;
  btn.textContent='⏳ 生成中...';

  // キャプチャ用ラッパーを作成（ヘッダー＋コンテンツ＋フッター）
  const hdr=document.querySelector('.hdr');
  const wrap=document.querySelector('.wrap');
  const footer=document.getElementById('sumFooter');

  // 一時的なコンテナに複製してキャプチャ
  const container=document.createElement('div');
  container.style.cssText='position:fixed;left:-9999px;top:0;width:'+Math.min(wrap.scrollWidth+40,960)+'px;background:#f0f2f5;font-family:inherit;';

  const hdrClone=hdr.cloneNode(true);
  hdrClone.style.position='static';
  container.appendChild(hdrClone);

  const wrapClone=wrap.cloneNode(true);
  wrapClone.style.paddingBottom='18px';
  container.appendChild(wrapClone);

  const footerClone=footer.cloneNode(true);
  footerClone.style.position='static';
  footerClone.style.borderRadius='0';
  container.appendChild(footerClone);

  document.body.appendChild(container);

  html2canvas(container,{
    scale:2,
    backgroundColor:'#f0f2f5',
    useCORS:true,
    logging:false,
    width:container.offsetWidth,
    height:container.scrollHeight,
  }).then(canvas=>{
    document.body.removeChild(container);
    const customer=document.getElementById('mClient').value||'見積';
    const date=document.getElementById('mDate').value||new Date().toISOString().slice(0,10);
    const link=document.createElement('a');
    link.download=`見積_${customer}_${date}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    btn.disabled=false;
    btn.textContent='🖼 画像で保存';
  }).catch(e=>{
    if(document.body.contains(container))document.body.removeChild(container);
    showToast('画像生成に失敗しました: '+e.message);
    btn.disabled=false;
    btn.textContent='🖼 画像で保存';
  });
}
addMatGroup();
addProcGroup();
renderOptions();
renderExtraOpts();
renderGoodsGroups();

/* ================================================================
   ヘッダー auto-hide（下スクロールで隠れ、上スクロールで戻る）
================================================================ */
(function(){
  const hdr=document.querySelector('.hdr');
  let lastY=0, ticking=false;
  const threshold=8; // 感度（px）
  window.addEventListener('scroll',function(){
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(function(){
      const y=window.scrollY;
      if(y>lastY+threshold&&y>60){
        hdr.classList.add('hdr-hidden');
      }else if(y<lastY-threshold||y<=10){
        hdr.classList.remove('hdr-hidden');
      }
      lastY=y;
      ticking=false;
    });
  },{passive:true});
})();
</script>
